    // ── SECURITY UTILITIES ────────────────────────────────────────────────────

    // sanitizeUrl: only allow https:// URLs, block javascript: data: ip-addresses etc.
    function sanitizeUrl(url) {
      if (!url || typeof url !== "string") return null;
      const u = url.trim();
      if (!u.startsWith("https://")) return null;
      try {
        const parsed = new URL(u);
        if (parsed.protocol !== "https:") return null;
        // Block bare IP addresses (common in phishing/malware)
        if (/^(\d{1,3}\.){3}\d{1,3}$/.test(parsed.hostname)) return null;
        // Block localhost/internal
        if (/localhost|127\.0\.0|0\.0\.0\.0|\.local$/.test(parsed.hostname)) return null;
        return u;
      } catch { return null; }
    }

    // sanitizeField: strip anything that looks like injection attempts, cap length
    function sanitizeField(val, maxLen) {
      if (!val || typeof val !== "string") return "";
      // Cap length to prevent prompt injection via very long strings
      let s = val.slice(0, maxLen || 500);
      // Strip template-literal injection patterns
      s = s.replace(/`/g, "'").replace(/\$\{/g, "$(");
      // Strip any HTML tags (shouldn't be there, belt-and-suspenders)
      s = s.replace(/<[^>]*>/g, "");
      return s.trim();
    }

    // sanitizeJob: apply all field safety to a job object from any source
    function sanitizeJob(j) {
      return {
        ...j,
        title:       sanitizeField(j.title, 150),
        company:     sanitizeField(j.company, 120),
        location:    sanitizeField(j.location, 120),
        remote_type: sanitizeField(j.remote_type, 60),
        source:      sanitizeField(j.source, 80),
        description: sanitizeField(j.description, 600),
        posted:      sanitizeField(j.posted, 40),
        salary:      j.salary ? sanitizeField(String(j.salary), 60) : null,
        seniority:   j.seniority ? sanitizeField(j.seniority, 80) : null,
        reason:      j.reason ? sanitizeField(j.reason, 300) : null,
        ats_board:   j.ats_board ? sanitizeField(j.ats_board, 200) : null,
        url:         sanitizeUrl(j.url),      // null if unsafe
        logo:        null,                     // never render external logo URLs from AI
        // Arrays: filter and sanitize each string
        requirements: Array.isArray(j.requirements)
          ? j.requirements.slice(0, 12).map(r => sanitizeField(String(r), 80)).filter(Boolean)
          : [],
        matched: Array.isArray(j.matched)

      // Title/company length sanity
      if (j.title.length < 3 || j.title.length > 150) return false;
      if (j.company.length < 2 || j.company.length > 120) return false;
      // URL, if present, must be safe
      if (j.url !== undefined && j.url !== null && j.url !== "" && !j.url) return false;
      // Domain must match claimed source (anti-hallucination cross-check)
      if (j.url && j.source) {
        const ul = j.url.toLowerCase();
        const sl = j.source.toLowerCase();
        if (sl.includes("greenhouse") && !ul.includes("greenhouse.io")) return false;
        if (sl.includes("lever")      && !ul.includes("lever.co"))      return false;
        if (sl.includes("workday")    && !ul.includes("workday"))        return false;

      // Only reach trust=4 if the proxy actually confirmed it open

      if (isDirectJobUrl(url)) return 2;
      if (TOP_BOARDS.some(d => url.includes(d))) return 1;
      return 1;

        const tb = urlTrustScore(b, confirmedLive);
        if (tb !== ta) return tb - ta;
        // Within same trust tier: sort by AI score (if available)
        const sa = (a.score != null ? a.score : -1);
        const sb = (b.score != null ? b.score : -1);
        if (sb !== sa) return sb - sa;
        return 0;

    // ── API CALL with automatic 429 retry backoff ─────────────────────────────
    async function apiCall(payload, signal, retries = 3) {
      const proxy  = (BAKED_PROXY_URL    || "").trim();
      const secret = (BAKED_PROXY_SECRET || "").trim();
      if (!proxy) throw new Error("Proxy URL not configured. Set BAKED_PROXY_URL in index.html.");
      const headers = { "Content-Type": "application/json" };
      if (secret) headers["x-proxy-secret"] = secret;

      for (let attempt = 0; attempt <= retries; attempt++) {
        const res = await fetch(proxy, {
          method: "POST", headers, body: JSON.stringify(payload),
          ...(signal ? { signal } : {}),
        });
        let data;
        const text = await res.text();
        try { data = JSON.parse(text); }
        catch(e) { throw new Error("Response parse error (" + res.status + "): " + text.slice(0, 120)); }

        // On 429 rate limit, wait and retry automatically
        if (res.status === 429 && attempt < retries) {
          const wait = (attempt + 1) * 15000; // 15s, 30s, 45s
          await new Promise(r => setTimeout(r, wait));
          continue;
        }

        if (!res.ok || data.type === "error") {
          throw new Error((data.error && data.error.message) || ("API error " + res.status));
        }
        if (!data.content) throw new Error("Empty response — you may be rate-limited. Wait 60s and retry.");
        return data;
      }
      throw new Error("Rate limited after retries — wait 60s and try again.");

    async function agenticSearch(system, user, onLog, signal, onTurn) {

        system,
        tools: [{ type: "web_search_20250305", name: "web_search" }],

      const blocks = data.content || [];

      // Surface any search queries Gemini logged (from grounding metadata)
      blocks.forEach(b => {

          onTurn && onTurn();

      });

      const txt = blocks.filter(b => b.type === "text").map(b => b.text).join("\n").trim();
      if (txt) return txt;
      throw new Error("Search returned no results. Try a broader role title.");

    function parseJSON(text) {
      if (!text) return null;
      const fence = "```";
      const m = text.match(new RegExp(fence + "(?:json)?\\s*([\\s\\S]*?)" + fence));
      const s = m ? m[1] : text;
      const a = s.indexOf("{"), b = s.lastIndexOf("}");
      if (a === -1 || b === -1) return null;
      try { return JSON.parse(s.slice(a, b+1)); } catch { return null; }

    async function loadCatalog(role, location) {

        if (!res.ok) return [];
        const data = await res.json();

        if (!data || !Array.isArray(data.jobs)) return [];
        const sevenDaysAgo = Date.now() - 7*24*60*60*1000;

          .filter(j => j && typeof j === "object")
          .map(j => sanitizeJob(j))
          .filter(j => qualityGateJob(j))
          .filter(j => {

            try { return new Date(j.fetched_at).getTime() > sevenDaysAgo; } catch { return true; }

          const words = role.toLowerCase().trim().split(/\s+/).filter(w => w.length > 2);
          if (words.length > 0) jobs = jobs.filter(j => {

            return words.some(w => t.includes(w));

        if (location && location.trim()) {
          const locWord = location.toLowerCase().trim().split(/[,\s]+/)[0];
          if (locWord.length > 2) jobs = jobs.filter(j =>
            (j.location||"").toLowerCase().includes(locWord) ||
            (j.remote_type||"").toLowerCase().includes("remote")
          );
        }
        return jobs;
      } catch(e) { return []; }
    }

    // ── SCORING RUNNER ────────────────────────────────────────────────────────
    async function runScoring(resume, jobs) {
      const raw   = await claudeHaikuCall(buildScoringPrompt(resume.trim(), jobs), SCORING_SYSTEM);
      const data  = parseJSON(raw);
      const map   = Object.fromEntries(((data && data.scores)||[]).map(s => [String(s.id), s]));
      return jobs.map(j => ({
        ...j,
        ...(map[String(j.id)] || {}),
        score: (map[String(j.id)] && map[String(j.id)].score != null) ? map[String(j.id)].score : null
      }));
    }

    // ── ATS VERIFICATION ──────────────────────────────────────────────────────
    async function verifyJobListings(jobs, onLog, signal, onStats) {
      const atsJobs    = jobs.filter(j => isAtsUrl(j.url));
      const nonAtsJobs = jobs.filter(j => !isAtsUrl(j.url));
      if (!atsJobs.length) return jobs;
      onLog("Verifying " + atsJobs.length + " ATS listing" + (atsJobs.length===1?"":"s") + "…");

      // Phase A: Server-side proxy verification (Workday API + full body scan)
      // ------------------------------------------------------------------
      // IMPORTANT: proxy results are trusted for definitive closed/open signals,
      // but open:null means "SPA or ambiguous — needs AI confirmation".
      // We NEVER mark verifiedOpen=true based on proxy alone unless the proxy
      // used a structured API (Workday CXS, Greenhouse API, Lever API).
      const proxyResults = {};  // url → {open:bool|null, method:string, spa:bool}
      const proxyBase = (BAKED_PROXY_URL||"").trim().replace(/\/proxy$/, "");

      if (proxyBase) {
        try {
          const secret = (BAKED_PROXY_SECRET||"").trim();
          const headers = { "Content-Type":"application/json" };
          if (secret) headers["x-proxy-secret"] = secret;
          const vr = await fetch(proxyBase + "/verify-url", {
            method:"POST", headers,
            body: JSON.stringify({ urls: atsJobs.map(j => ({ url:j.url, title:j.title, company:j.company })) }),
            signal,
          });
          if (vr.ok) {
            const vd = await vr.json();
            (vd.results||[]).forEach(r => { proxyResults[r.url] = r; });
            const definitelyOpen   = Object.values(proxyResults).filter(r => r.open === true).length;
            const definitelyClosed = Object.values(proxyResults).filter(r => r.open === false).length;
            const uncertain        = Object.values(proxyResults).filter(r => r.open === null).length;
            onLog(`· Proxy check: ${definitelyOpen} open, ${definitelyClosed} closed, ${uncertain} uncertain`);
          }
        } catch(e) {
          if (e.name === "AbortError") throw e;
          onLog("· Proxy unavailable — using AI verification only");
        }
      }

      // Remove definite closed listings immediately
      let definiteClosed = 0;
      let remaining = atsJobs.filter(j => {
        const r = proxyResults[j.url];
        if (r && r.open === false) { definiteClosed++; return false; }
        return true;
      });
      if (definiteClosed > 0) onLog("✓ Removed " + definiteClosed + " confirmed closed listing" + (definiteClosed===1?"":"s"));

      // Mark listings the proxy confirmed open via structured API (NOT body scan alone)
      // Only Workday CXS API, Greenhouse API, Lever API results get verifiedOpen=true here.
      // Body scan results stay uncertain until AI confirms.
      remaining.forEach(j => {
        const r = proxyResults[j.url];
        if (r && r.open === true && r.method && r.method.includes("-api")) {
          j.verifiedOpen = true;
        }
      });

      // Phase B: AI verification for all listings NOT confirmed by a structured API
      // -----------------------------------------------------------------------
      // This catches: Workday SPA (proxy couldn't read), SmartRecruiters uncertain,
      // Ashby, iCIMS, Taleo, BambooHR — anything without a definitive structured API result.
      const needsAI = remaining.filter(j => {
        const r = proxyResults[j.url];
        // Already confirmed open by structured API → skip
        if (j.verifiedOpen === true) return false;
        // Proxy confirmed closed → already removed above
        // Everything else needs AI check
        return true;
      });

      if (needsAI.length > 0) {
        onLog("· AI-verifying " + needsAI.length + " listing" + (needsAI.length===1?"":"s") + " (proxy could not confirm)…");

        const verifySystem = `You are a job listing verifier. For each URL, search and check if the job is currently open.

CRITICAL RULES:
- Workday (myworkdayjobs.com): These are SPAs. Search "site:[url-domain] [job-title] [company]" OR just navigate to the URL.
  Workday expired jobs show "The page you are looking for doesn't exist" — this means CLOSED.
  Workday open jobs show the full job description and an Apply button.
- SmartRecruiters: "Sorry, this job has expired" = CLOSED. Full job page with Apply = OPEN.
- General: Any apply button visible = OPEN. Error/expired/filled message = CLOSED.

For EACH URL, you must search for it or navigate to it and determine status.
Do NOT assume open if you cannot confirm. When uncertain, mark open:false (conservative — protect users from dead links).
Return ONLY JSON: {"results":[{"url":"...","open":true,"signal":"what you saw on the page"}]}`;

        const listing = needsAI.map((j,i) =>
          `${i+1}. ${j.title} at ${j.company}\n   URL: ${j.url}`
        ).join("\n\n");

        try {
          const raw = await agenticSearch(
            verifySystem,
            `Verify each job listing. Check every URL. Return JSON with open status:\n\n${listing}`,
            msg => { if (msg.startsWith("Searching: ")) onLog("· Verifying: " + msg.slice(11).slice(0,70)); },
            signal
          );
          const vdata = parseJSON(raw);
          let aiConfirmed = 0, aiRemoved = 0;
          (vdata && vdata.results || []).forEach(r => {
            const job = needsAI.find(j => j.url === r.url || r.url?.includes(j.url) || j.url?.includes(r.url));
            if (!job) return;
            if (r.open === false) {
              // Mark for removal
              job._aiClosed = true;
              aiRemoved++;
            } else if (r.open === true) {
              job.verifiedOpen = true;
              aiConfirmed++;
            }
            // open:null = still uncertain, leave as trust=3
          });
          if (aiConfirmed > 0) onLog("✓ AI confirmed " + aiConfirmed + " listing" + (aiConfirmed===1?"":"s") + " open");
          if (aiRemoved  > 0) onLog("✓ AI removed "   + aiRemoved  + " expired/closed listing" + (aiRemoved===1?"":"s"));
        } catch(e) {
          if (e.name === "AbortError") throw e;
          onLog("· AI verification failed — showing ATS listings unconfirmed");
        }

        // Remove AI-marked closed listings
        remaining = remaining.filter(j => !j._aiClosed);
      }

      const totalRemoved = definiteClosed + (atsJobs.length - definiteClosed - remaining.length);
      onStats && onStats({ removed: totalRemoved, total: atsJobs.length });

      const final = remaining.concat(nonAtsJobs);
      if (!final.length) return jobs; // safety: never return empty if removal went wrong
      return final;
    }

    // ── SAFE LOCALSTORAGE HELPERS ─────────────────────────────────────────────
    function lsGet(key, fallback, maxLen) {
      try {
        const v = localStorage.getItem(key);
        if (!v || typeof v !== "string") return fallback;
        // Length guard against poisoned data
        if (maxLen && v.length > maxLen) return fallback;
        return v;
      } catch { return fallback; }
    }
    function lsSet(key, value) {
      try {
        if (value === null || value === undefined) localStorage.removeItem(key);
        else localStorage.setItem(key, String(value).slice(0, 500));
      } catch {}
    }
    function lsGetObj(key, fallback) {
      try {
        const v = localStorage.getItem(key);
        if (!v) return fallback;
        const parsed = JSON.parse(v);
        return (parsed && typeof parsed === "object") ? parsed : fallback;
      } catch { return fallback; }
    }

            strokeDasharray={`${Math.min(score,100)/100*c} ${c}`}

          <text x={size/2} y={size/2+1} textAnchor="middle" dominantBaseline="middle"
            fill={col} fontSize="13" fontWeight="600" fontFamily="IBM Plex Mono">{score}</text>

    // ── MAIN COMPONENT ────────────────────────────────────────────────────────
    function JobCompiler() {

      });
      const [salary,    setSalary]    = useState(() => lsGet("sjc_sal","",20));
      const [seniority, setSeniority] = useState(() => {
        const v = lsGet("sjc_sen","",30);
        return ["","entry","manager","director","executive"].includes(v) ? v : "";
      });
      const [resume,    setResume]    = useState("");

      // UI state
      const [phase,       setPhase]       = useState("setup");
      const [log,         setLog]         = useState([]);
      const [jobs,        setJobs]        = useState([]);
      const [meta,        setMeta]        = useState(null);
      const [err,         setErr]         = useState("");
      const [open,        setOpen]        = useState(null);
      const [filter,      setFilter]      = useState("all");
      const [resultTab,   setResultTab]   = useState("listings");
      const [checked,     setChecked]     = useState({});
      const [promptPreview, setPromptPreview] = useState(null);
      const [pendingResume, setPendingResume] = useState("");
      const [rescoring,   setRescoring]   = useState(false);
      const [running,     setRunning]     = useState(false);
      const [hiddenJobs,  setHiddenJobs]  = useState({});
      const [undoStack,   setUndoStack]   = useState([]);
      const [confirmedLive, setConfirmedLive] = useState({});
      const [copiedId,    setCopiedId]    = useState(null);
      const [scoringFailed, setScoringFailed] = useState(false);
      const [verifyTimedOut, setVerifyTimedOut] = useState(false);
      const [verifyStats, setVerifyStats] = useState(null);
      const [progress,    setProgress]    = useState(0);
      const [progressLabel, setProgressLabel] = useState("");
      const autoHiddenRef = useRef(null);

      // (API key handled server-side — no user key state needed)

      // Persist search params (non-sensitive)
      useEffect(() => {
        lsSet("sjc_role",   role);
        lsSet("sjc_loc",    location);
        lsSet("sjc_remote", remote);
        lsSet("sjc_sal",    salary);
        lsSet("sjc_sen",    seniority);
      }, [role, location, remote, salary, seniority]);

      const addLog = msg => setLog(prev => [...prev, msg]);
      const scored = resume.trim().length > 200
        && resume.trim().split("\n").filter(l => l.trim().length > 0).length >= 3;

      // Computed visible jobs: apply trust sort, then filter by tier
      const sortedJobs = useMemo(
        () => sortJobs(jobs, confirmedLive),
        [jobs, confirmedLive]
      );
      const visible = sortedJobs.filter(j =>
        !hiddenJobs[j.id] && (filter === "all" || j.tier === filter)
      );
      const hasScores = jobs.some(j => j.score != null);

      // Trust summary counts for header
      const trustCounts = useMemo(() => {
        const v = jobs.filter(j => !hiddenJobs[j.id]);
        return {
          verified:   v.filter(j => urlTrustScore(j, confirmedLive) >= 4).length,
          ats:        v.filter(j => urlTrustScore(j, confirmedLive) === 3).length,
          direct:     v.filter(j => urlTrustScore(j, confirmedLive) === 2).length,
          unverified: v.filter(j => urlTrustScore(j, confirmedLive) <= 1).length,
        };
      }, [jobs, hiddenJobs, confirmedLive]);

      const confirmLive = job => {
        setConfirmedLive(prev => ({ ...prev, [job.id]: true }));
        setHiddenJobs(prev => { const n = {...prev}; delete n[job.id]; return n; });
      };
      const dismissJob = (job, reason) => {
        setHiddenJobs(prev => ({ ...prev, [job.id]: reason }));
        setUndoStack(prev => [...prev, { id:job.id, title:job.title, company:job.company, reason }]);
        try {
          const ex = lsGetObj("sjc_dismissed", {});
          if (job.url) ex[job.url] = { reason, ts:Date.now() };
          localStorage.setItem("sjc_dismissed", JSON.stringify(ex));
        } catch {}
      };
      const undoLast = () => {
        setUndoStack(prev => {
          if (!prev.length) return prev;
          const last = prev[prev.length-1];
          setHiddenJobs(h => { const n={...h}; delete n[last.id]; return n; });
          try {
            const j = jobs.find(j => j.id === last.id);
            if (j && j.url) {
              const ex = lsGetObj("sjc_dismissed", {});
              delete ex[j.url];
              localStorage.setItem("sjc_dismissed", JSON.stringify(ex));
            }
          } catch {}
          return prev.slice(0,-1);
        });
      };

      // Field styles
      const F = { width:"100%", padding:"9px 12px", borderRadius:5, background:"var(--card)",
        border:"1px solid var(--b1)", fontSize:14, color:"var(--text)", outline:"none", fontFamily:"inherit" };
      const L = { display:"block", fontSize:10.5, fontFamily:"var(--mono)", color:"var(--muted)",
        letterSpacing:".08em", textTransform:"uppercase", marginBottom:5 };

      // ── RUN SEARCH ────────────────────────────────────────────────────────
      const run = async () => {
        if (!role.trim()) { setErr("Enter a target role."); return; }

        setErr(""); setPhase("searching"); setLog([]); setJobs([]); setMeta(null);
        setOpen(null); setScoringFailed(false); setRunning(true); setVerifyTimedOut(false);
        setVerifyStats(null); setProgress(0); setProgressLabel("Loading job catalog…");

        try {
          // Phase 1: Catalog (0→20%)
          addLog("Loading catalog…");
          const catalogJobs = await loadCatalog(role.trim(), location.trim());
          if (catalogJobs.length) addLog("✓ Catalog: " + catalogJobs.length + " matching listing" + (catalogJobs.length===1?"":"s"));
          else addLog("· Catalog empty or no matches — live search only");
          setProgress(20);

          // Phase 2: Prep (20→30%)
          setProgressLabel("Preparing search…");
          const catalogUrls = new Set(catalogJobs.map(j => j.url).filter(Boolean));
          const catalogBase = catalogJobs.map((j,i) => ({ ...j, id:i+1, _fromCatalog:true }));
          setProgress(30);

          // Phase 3: Live search (30→75%)
          setProgressLabel("Searching live job boards…");
          addLog("Starting live search — searching ATS boards, LinkedIn, Indeed, BuiltIn…");
          const progressRef = { v: 30 };
          const rawText = await agenticSearch(
            buildSearchSystem(),
            buildSearchUser({ role:role.trim(), location:location.trim(), remote, salary:salary.replace(/\D/g,""), seniority }),
            msg => {
              addLog(msg);
              if (msg.startsWith("Searching: ")) {
                progressRef.v = Math.min(75, progressRef.v + 5);
                setProgress(progressRef.v);
                setProgressLabel("Searching: " + msg.slice(11).slice(0,55) + (msg.length>66?"…":""));
              }
            },
            null,
            () => { progressRef.v = Math.min(75, progressRef.v + 3); setProgress(progressRef.v); }
          );

          addLog("Parsing results…");
          let parsed = parseJSON(rawText);
          if (!parsed || !Array.isArray(parsed.jobs)) {
            addLog("Retrying parse…");
            const retry = await claudeCall(
              'Extract all job listings from the text below. Return ONLY valid JSON matching this schema:\n' +
              '{"jobs":[{"id":1,"title":"","company":"","location":"","remote_type":"","salary":null,"posted":"","url":"","source":"","description":"","requirements":[],"ats_board":""}],"meta":{"total":0,"note":""}}' +
              "\n\nTEXT:\n" + rawText.slice(0, 12000)
            );
            parsed = parseJSON(retry);
          }

          const allLive = ((parsed && parsed.jobs)||[])
            .map(j => sanitizeJob(j))
            .filter(j => qualityGateJob(j));

          let liveDirect = allLive.filter(j => isDirectJobUrl(j.url || ""));
          const skippedSearchPage = allLive.length - liveDirect.length;
          if (liveDirect.length === 0 && allLive.length > 0) {
            liveDirect = allLive;
            addLog("· Direct URLs not found — showing unverified listings");
          } else if (skippedSearchPage > 0) {
            addLog("· " + skippedSearchPage + " listing(s) skipped — search page URLs");
          }

          // Deduplicate against catalog
          const uniqueLive = liveDirect.filter(j => !j.url || !catalogUrls.has(j.url));
          if (liveDirect.length - uniqueLive.length > 0)
            addLog("· " + (liveDirect.length - uniqueLive.length) + " duplicate(s) removed");

          // Merge and renumber
          const merged = [
            ...catalogBase,
            ...uniqueLive.map(j => ({
              ...j, _fromCatalog:false,
              source: j.source || "Live Search",
            }))
          ].map((j,i) => ({ ...j, id:i+1, tier:null, score:null, matched:[], gaps:[] }));

          if (!merged.length) throw new Error('No listings found for "' + role.trim() + '". Try a broader title or different location.');
          addLog("✓ " + merged.length + " listings (" + catalogBase.length + " catalog + " + uniqueLive.length + " live)");

          // Cross-reference dismissed URLs
          let found = merged;
          try {
            const prevDismissed = lsGetObj("sjc_dismissed", {});
            const autoHidden = {};
            found = merged.map(j => {
              if (j.url && prevDismissed[j.url]) {
                autoHidden[j.id] = prevDismissed[j.url].reason || "Previously dismissed";
                return { ...j, _autoDismissed:true };
              }
              return j;
            });
            if (Object.keys(autoHidden).length > 0) {
              autoHiddenRef.current = autoHidden;
              addLog("· " + Object.keys(autoHidden).length + " previously dismissed listing(s) hidden");
            }
          } catch {}

          setProgress(75);

          // Phase 4: ATS verify (75→85%)
          setProgressLabel("Verifying ATS listings…");
          const verifyTimer = setTimeout(() => setVerifyTimedOut(true), 90000);
          try {
            found = await verifyJobListings(found, addLog, null, stats => setVerifyStats(stats));
            clearTimeout(verifyTimer);
          } catch(e) {
            clearTimeout(verifyTimer);
            if (e.name !== "AbortError") addLog("· Verification error — showing unverified");
          }
          if (!found.length) throw new Error("All found listings were closed. Try a broader search.");
          setMeta({ total:found.length, note:"Live search + catalog · verified ATS listings shown first" });
          addLog("✓ " + found.length + " verified listings");
          setProgress(85);

          // Phase 5: Score (85→96%)
          let final;
          if (scored) {
            setProgressLabel("Scoring against your resume…");
            addLog("Scoring against your resume…");
            try {
              const scored_ = await runScoring(resume, found);
              // Apply scores then sort by trust tier primary
              final = sortJobs(scored_, null);
              addLog("✓ Scored and ranked " + final.length + " listings");
            } catch(scoreErr) {
              addLog("· Scoring unavailable — listings ranked by link quality");
              final = sortJobs(found, null);
              setScoringFailed(true);
            }
          } else {
            final = sortJobs(found, null);
            addLog("Listing by link reliability — paste resume to rank by fit");
          }
          setProgress(96);

          // Phase 6: Render (96→100%)
          setProgressLabel("Preparing results…");
          setJobs(final);
          if (autoHiddenRef.current) {
            setHiddenJobs(prev => ({ ...prev, ...autoHiddenRef.current }));
            autoHiddenRef.current = null;
          }
          setProgress(100);
          setTimeout(() => {
            setPhase("results"); setRunning(false);
            try { window.scrollTo({ top:0, behavior:"smooth" }); } catch {}
          }, 300);

        } catch(e) {
          let friendly = e.message || "Unknown error";
          if (/401|invalid.*api|authentication/i.test(friendly))
            friendly = "Authentication error — check that GEMINI_API_KEY is set correctly in Vercel.";
          else if (/403/.test(friendly))
            friendly = "Forbidden — check your PROXY_SECRET setting.";
          else if (/429|rate.?limit/i.test(friendly))
            friendly = "Rate limited — wait 2-3 minutes and retry.";
          else if (/529|overload|capacity/i.test(friendly))
            friendly = "AI service at capacity — wait 60s and retry.";
          else if (/proxy|CORS|network|fetch/i.test(friendly))
            friendly = "Connection error — check your Vercel deployment and BAKED_PROXY_URL setting.";
          else if (/No listings/i.test(friendly))
            friendly += " Try a broader title or remove the location filter.";
          addLog("✗ " + friendly);
          setErr(friendly);
          setPhase("failed"); setRunning(false);
        }
      };

      // ── NAV ───────────────────────────────────────────────────────────────
      const Nav = () => (
        <div style={{ background:"var(--nav)", borderBottom:"1px solid var(--b1)",
          padding:"10px 20px", display:"flex", alignItems:"center", gap:14, flexWrap:"wrap",
          position:"sticky", top:0, zIndex:100, backdropFilter:"blur(12px)", WebkitBackdropFilter:"blur(12px)" }}>
          <Logo h={32} />
          <div style={{ width:1, height:22, background:"var(--b2)" }} />
          <div>
            <div style={{ fontSize:12.5, fontWeight:700, color:"var(--text)", letterSpacing:".04em" }}>
              Siegeworks Job Compiler
            </div>
            <div style={{ fontSize:10, color:"var(--muted)", fontFamily:"var(--mono)", letterSpacing:".06em", textTransform:"uppercase", marginTop:1 }}>
              Siegeworks Marketing LLC
            </div>
          </div>
          {phase === "results" && (
            <button onClick={() => { setPhase("setup"); setJobs([]); setFilter("all"); setChecked({}); }}
              style={{ marginLeft:"auto", padding:"5px 12px", borderRadius:4, background:"transparent",
                border:"1px solid var(--b2)", color:"var(--muted)", cursor:"pointer", fontSize:12 }}>
              ← New Search
            </button>
          )}
        </div>
      );

      // ── PROXY STATUS INDICATOR ────────────────────────────────────────────
      const ProxyStatus = () => (
        <div style={{ marginBottom:14, padding:"8px 13px", borderRadius:5,
          background:"rgba(16,185,129,0.06)", border:"1px solid rgba(16,185,129,0.2)" }}>
          <span style={{ fontSize:12, color:"#10B981" }}>
            ● AI search ready
          </span>
          <span style={{ marginLeft:10, fontSize:11, fontFamily:"var(--mono)", color:"var(--muted)" }}>
            Powered by Gemini · no account needed
          </span>
        </div>
      );

      // ─────────────────────────────────────────────────────────────────────
      // ── SETUP SCREEN ─────────────────────────────────────────────────────
      // ─────────────────────────────────────────────────────────────────────
      if (phase === "setup") return (
        <div style={{ minHeight:"100vh", background:"var(--bg)", display:"flex", flexDirection:"column" }}>
          <style>{CSS}</style>
          <Nav />
          <div style={{ maxWidth:740, margin:"0 auto", padding:"26px 18px", width:"100%" }}>

            <div style={{ textAlign:"center", marginBottom:24 }}>
              <div style={{ fontSize:10, letterSpacing:".16em", textTransform:"uppercase",
                fontFamily:"var(--mono)", color:"var(--muted)", marginBottom:12 }}>Siegeworks Marketing LLC</div>
              <h1 style={{ fontFamily:"var(--serif)", fontSize:clamp(28,4.5,38), fontWeight:600, lineHeight:1.18, marginBottom:10 }}>
                Real Jobs.<br /><span style={{ color:"var(--red-lt)" }}>Searched Live. Ranked by AI.</span>
              </h1>
              <p style={{ fontSize:13.5, color:"var(--muted)", maxWidth:500, margin:"0 auto", lineHeight:1.75 }}>
                Checks a pre-verified catalog first, then searches Greenhouse, Lever, Workday, LinkedIn, Indeed,
                and BuiltIn live. Verified ATS links ranked first — no hallucinated listings, no search-results pages.
              </p>
            </div>

            <ProxyStatus />

            <div style={{ background:"var(--surf)", border:"1px solid var(--b1)", borderRadius:8, padding:20 }}>
              {/* Resume field */}
              <div style={{ marginBottom:14 }}>
                <label style={L}>
                  Resume{" "}
                  <span style={{ marginLeft:8, fontFamily:"var(--mono)", fontSize:9.5, letterSpacing:".07em", padding:"2px 7px", borderRadius:3,
                    background: scored ? "rgba(16,185,129,0.1)" : "rgba(185,28,28,0.1)",
                    border: scored ? "1px solid rgba(16,185,129,0.3)" : "1px solid rgba(185,28,28,0.25)",
                    color: scored ? "var(--green-lt)" : "#FCA5A5" }}>
                    {scored ? "✓ AI SCORING ACTIVE" : "PASTE TO ENABLE SCORING"}
                  </span>
                  <span style={{ marginLeft:8, fontSize:9.5, fontFamily:"var(--mono)", color:"var(--green-lt)",
                    letterSpacing:".05em" }}>🔒 NEVER TRANSMITTED</span>
                </label>
                <textarea style={{ ...F, height:130, resize:"vertical", fontSize:12.5,
                  fontFamily:"var(--mono)", lineHeight:1.6,
                  borderColor: scored ? "rgba(16,185,129,0.3)" : "var(--b1)", transition:"border-color .25s" }}
                  placeholder="Paste your resume here. Claude will rank every listing by match strength, identify skill gaps, and explain exactly why you fit (or don't) each role.&#10;&#10;Your resume is processed locally and is never transmitted to our servers."
                  value={resume} onChange={e => setResume(e.target.value)}
                  onFocus={e => e.target.style.borderColor = "rgba(185,28,28,0.5)"}
                  onBlur={e  => { e.target.style.borderColor = scored ? "rgba(16,185,129,0.3)" : "var(--b1)"; }}
                />
              </div>

              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }} className="grid-2">
                <div style={{ gridColumn:"1 / -1" }}>
                  <label style={L}>Target Role *</label>
                  <input style={{ ...F, fontSize:15 }}
                    placeholder='e.g. "Brand Marketing Manager" or "Software Engineer"'
                    value={role} onChange={e => setRole(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && run()}
                    onFocus={e => e.target.style.borderColor = "var(--red)"}
                    onBlur={e  => e.target.style.borderColor = "var(--b1)"} />
                </div>
                <div>
                  <label style={L}>Location</label>
                  <input style={F} placeholder="e.g. Seattle, WA — or leave blank for US-wide"
                    value={location} onChange={e => setLocation(e.target.value)}
                    onFocus={e => e.target.style.borderColor = "var(--red)"}
                    onBlur={e  => e.target.style.borderColor = "var(--b1)"} />
                </div>
                <div>
                  <label style={L}>Work Type</label>
                  <select style={{ ...F, cursor:"pointer" }} value={remote} onChange={e => setRemote(e.target.value)}>
                    <option value="any">Any</option>
                    <option value="hybrid">Hybrid</option>
                    <option value="remote">Remote Only</option>
                    <option value="onsite">On-site</option>
                  </select>
                </div>
                <div>
                  <label style={L}>Seniority</label>
                  <select style={{ ...F, cursor:"pointer" }} value={seniority} onChange={e => setSeniority(e.target.value)}>
                    <option value="">Any Level</option>
                    <option value="entry">Entry / Associate</option>
                    <option value="manager">Manager / Mid-Senior</option>
                    <option value="director">Director</option>
                    <option value="executive">Executive / VP</option>
                  </select>
                </div>
                <div>
                  <label style={L}>Target Salary</label>
                  <select style={{ ...F, cursor:"pointer" }} value={salary} onChange={e => setSalary(e.target.value)}>
                    <option value="">Any Salary</option>
                    <option value="45000">$40K – $60K</option>
                    <option value="65000">$60K – $80K</option>
                    <option value="85000">$80K – $100K</option>
                    <option value="110000">$100K – $130K</option>
                    <option value="145000">$130K – $160K</option>
                    <option value="175000">$160K+</option>
                  </select>
                </div>
              </div>

              {err && (
                <div style={{ marginBottom:10, padding:"8px 12px", borderRadius:5,
                  background:"rgba(220,38,38,.1)", border:"1px solid rgba(220,38,38,.3)",
                  fontSize:12.5, color:"#FCA5A5" }}>{err}</div>
              )}

              <button onClick={run} disabled={running}
                style={{ width:"100%", padding:"12px 0", borderRadius:5, fontSize:14, fontWeight:700,
                  background: running ? "var(--red-dk)" : "var(--red)", color:"white", border:"none",
                  cursor: running ? "not-allowed" : "pointer", letterSpacing:".03em",
                  opacity: running ? 0.7 : 1 }}>
                {running ? "Searching…" : "Search Live Job Listings →"}
              </button>

              <div style={{ marginTop:12, display:"flex", justifyContent:"center", gap:24, flexWrap:"wrap" }}>
                {[
                  ["✓ ATS boards first","Greenhouse, Lever, Workday"],
                  ["✓ Verified URLs","Dead listings removed"],
                  ["✓ Zero hallucinations","Real pages only"],
                ].map(([t,s]) => (
                  <div key={t} style={{ textAlign:"center" }}>
                    <div style={{ fontSize:11, fontWeight:600, color:"var(--green-lt)", fontFamily:"var(--mono)" }}>{t}</div>
                    <div style={{ fontSize:10.5, color:"var(--dim)", marginTop:2 }}>{s}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );

      // ─────────────────────────────────────────────────────────────────────
      // ── SEARCHING / FAILED ────────────────────────────────────────────────
      // ─────────────────────────────────────────────────────────────────────
      if (phase === "searching" || phase === "failed") return (
        <div style={{ minHeight:"100vh", background:"var(--bg)", display:"flex", flexDirection:"column" }}>
          <style>{CSS}</style>
          <Nav />
          <div style={{ maxWidth:560, margin:"60px auto 0", padding:"0 18px", width:"100%" }}>
            <div style={{ textAlign:"center", marginBottom:28 }}>
              {phase === "failed"
                ? <div style={{ fontSize:40, marginBottom:12 }}>⚠️</div>
                : <div style={{ width:44, height:44, borderRadius:"50%", border:"3px solid var(--b2)",
                    borderTopColor:"var(--red)", margin:"0 auto 20px", animation:"spin 1s linear infinite" }} />
              }
              <div style={{ fontSize:20, fontWeight:600, color:"var(--text)", fontFamily:"var(--serif)", marginBottom:6 }}>
                {phase==="failed" ? "Search Failed" : "Finding your next role…"}
              </div>
              {phase==="searching" && (
                <div style={{ fontSize:12.5, color:"var(--muted)", lineHeight:1.7 }}>
                  Searching ATS boards first — Greenhouse, Lever, Workday, Ashby — then LinkedIn, Indeed & BuiltIn.
                  <br /><span style={{ opacity:.65 }}>Takes 30–90s. We're reading real listings.</span>
                </div>
              )}
            </div>

            {phase === "searching" && (
              <div style={{ marginBottom:18 }}>
                <div className="progress-track">
                  <div className="progress-fill" style={{ width:progress + "%" }} />
                </div>
                <div style={{ display:"flex", justifyContent:"space-between" }}>
                  <span style={{ fontSize:11.5, color:"var(--muted)", fontFamily:"var(--mono)",
                    flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", paddingRight:8 }}>
                    {progressLabel}
                  </span>
                  <span style={{ fontSize:11, color:"var(--dim)", fontFamily:"var(--mono)", flexShrink:0 }}>
                    {progress}%
                  </span>
                </div>
              </div>
            )}

            <div style={{ background:"var(--card)", border:"1px solid var(--b1)", borderRadius:7,
              padding:"14px 16px", fontFamily:"var(--mono)", fontSize:11.5, color:"var(--muted)",
              maxHeight:240, overflowY:"auto" }}>
              {log.length === 0 && <span style={{ color:"var(--dim)" }}>Initializing…</span>}
              {log.map((l,i) => {
                const isSearch = l.startsWith("Searching: ");
                const isOk     = l.startsWith("✓");
                const isErr    = l.startsWith("✗");
                return (
                  <div key={i} style={{ marginBottom:5, display:"flex", alignItems:"flex-start", gap:8,
                    opacity: i < log.length - 5 ? 0.35 : 1, transition:"opacity .3s",
                    color: isErr ? "#FCA5A5" : isOk ? "#86EFAC" : "var(--muted)" }}>
                    <span style={{ flexShrink:0, marginTop:1, fontSize:12,
                      color: isErr ? "#FCA5A5" : isOk ? "#10B981" : isSearch ? "var(--blue-lt)" : "var(--dim)" }}>
                      {isErr ? "✗" : isOk ? "✓" : isSearch ? "→" : "·"}
                    </span>
                    {isSearch
                      ? <span>Searching <span style={{ color:"var(--text)" }}>{l.slice(11)}</span></span>
                      : <span>{l}</span>
                    }
                  </div>
                );
              })}
            </div>

            {phase === "failed" && (
              <button onClick={() => { setPhase("setup"); setErr(""); }}
                style={{ marginTop:20, width:"100%", padding:"10px 0", borderRadius:5, fontSize:13,
                  fontWeight:600, cursor:"pointer", background:"var(--red)", color:"white", border:"none" }}>
                ← Back to Search
              </button>
            )}

            {phase === "searching" && (
              <div style={{ marginTop:28, padding:"16px 20px", borderRadius:6,
                background:"rgba(255,255,255,0.018)", border:"1px solid var(--b1)" }}>
                <p style={{ fontFamily:"var(--serif)", fontStyle:"italic", fontSize:13.5,
                  color:"var(--muted)", lineHeight:1.85, marginBottom:10 }}>
                  "It is said that despite its many glaring (and occasionally fatal) inaccuracies, the{" "}
                  <em>Hitchhiker's Guide to the Galaxy</em> itself has outsold the{" "}
                  <em>Encyclopedia Galactica</em> because it is slightly cheaper, and because it has the
                  words <strong style={{ color:"var(--text)", fontStyle:"normal", letterSpacing:".04em" }}>DON'T PANIC</strong>
                  {" "}in large, friendly letters on the cover."
                </p>
                <p style={{ fontSize:11, fontFamily:"var(--mono)", color:"var(--dim)",
                  letterSpacing:".06em", textTransform:"uppercase" }}>
                  — Douglas Adams, <em style={{ textTransform:"none", letterSpacing:"normal" }}>The Hitchhiker's Guide to the Galaxy</em>
                </p>
              </div>
            )}
          </div>
        </div>
      );

      // ─────────────────────────────────────────────────────────────────────
      // ── RESULTS SCREEN ────────────────────────────────────────────────────
      // ─────────────────────────────────────────────────────────────────────
      const filters = ["all","BEST MATCH","GOOD MATCH","WORTH EXPLORING"];
      const todoJobs = jobs.filter(j => checked[j.id]);

      return (
        <div style={{ minHeight:"100vh", background:"var(--bg)", display:"flex", flexDirection:"column" }}>
          <style>{CSS}</style>
          <Nav />
          <div style={{ maxWidth:800, margin:"0 auto", padding:"22px 16px", width:"100%" }}>

            {/* ── Tabs ── */}
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
              marginBottom:14, flexWrap:"wrap", gap:8 }}>
              <div style={{ display:"flex", gap:4, alignItems:"center" }}>
                {["listings","action plan"].map(t => (
                  <button key={t} onClick={() => setResultTab(t)}
                    style={{ padding:"6px 14px", borderRadius:4, fontSize:12, fontWeight:600, cursor:"pointer",
                      border:"none", fontFamily:"var(--mono)", letterSpacing:".05em", textTransform:"uppercase",
                      background: resultTab===t ? "var(--red)" : "transparent",
                      color:      resultTab===t ? "white" : "var(--muted)" }}>
                    {t === "listings"
                      ? (jobs.length + " Listings" + (verifyStats && verifyStats.removed > 0 ? " · " + verifyStats.removed + " removed" : ""))
                      : ("Action Plan" + (todoJobs.length > 0 ? " (" + todoJobs.length + ")" : ""))
                    }
                  </button>
                ))}
              </div>
              {resultTab === "listings" && hasScores && (
                <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                  {filters.map(f => (
                    <button key={f} onClick={() => setFilter(f)}
                      style={{ padding:"4px 10px", borderRadius:4, fontSize:11, fontWeight:600, cursor:"pointer",
                        fontFamily:"var(--mono)", border:"1px solid",
                        borderColor: filter===f ? "var(--red)" : "var(--b2)",
                        background:  filter===f ? "rgba(153,27,27,.15)" : "transparent",
                        color:       filter===f ? "var(--red-lt)" : "var(--muted)" }}>
                      {f === "all" ? "All" : f}
                    </button>
                  ))}
                </div>
              )}
            </div>

            {/* ── Trust summary bar ── */}
            {resultTab === "listings" && jobs.length > 0 && (
              <div style={{ marginBottom:14, padding:"9px 14px", borderRadius:6,
                background:"var(--surf)", border:"1px solid var(--b1)",
                display:"flex", alignItems:"center", gap:18, flexWrap:"wrap" }}>
                <span style={{ fontSize:11, fontFamily:"var(--mono)", color:"var(--muted)", letterSpacing:".05em" }}>LINK QUALITY</span>
                {trustCounts.verified > 0 && (
                  <span style={{ fontSize:11.5, color:"var(--green-lt)", fontFamily:"var(--mono)" }}>
                    ✓ {trustCounts.verified} verified open
                  </span>
                )}
                {trustCounts.ats > 0 && (
                  <span style={{ fontSize:11.5, color:"var(--blue-lt)", fontFamily:"var(--mono)" }}>
                    ● {trustCounts.ats} ATS link{trustCounts.ats===1?"":"s"} (unconfirmed)
                  </span>
                )}
                {trustCounts.direct > 0 && (
                  <span style={{ fontSize:11.5, color:"var(--blue-lt)", fontFamily:"var(--mono)", opacity:.75 }}>
                    ● {trustCounts.direct} direct listing{trustCounts.direct===1?"":"s"}
                  </span>
                )}
                {trustCounts.unverified > 0 && (
                  <span style={{ fontSize:11.5, color:"var(--amber-lt)", fontFamily:"var(--mono)" }}>
                    ⚠ {trustCounts.unverified} unverified
                  </span>
                )}
                <span style={{ fontSize:10.5, color:"var(--dim)", marginLeft:"auto" }}>
                  Verified first · ATS links need manual check
                </span>
              </div>
            )}

            {meta && meta.note && resultTab === "listings" && (
              <div style={{ marginBottom:10, fontSize:11.5, color:"var(--muted)" }}>{meta.note}</div>
            )}

            {verifyTimedOut && resultTab === "listings" && (
              <div style={{ marginBottom:12, padding:"9px 14px", borderRadius:5,
                display:"flex", alignItems:"center", gap:8,
                background:"rgba(245,158,11,0.07)", border:"1px solid rgba(245,158,11,0.25)" }}>
                <span>⚠</span>
                <span style={{ fontSize:12.5, color:"var(--amber-lt)" }}>
                  Verification timed out — listings unconfirmed. Use feedback buttons to flag dead links.
                </span>
              </div>
            )}

            {/* ── Listings tab ── */}
            {resultTab === "listings" && (
              <>
                {scoringFailed && (
                  <div className="fi" style={{ marginBottom:14, padding:"11px 15px", borderRadius:6,
                    background:"rgba(245,158,11,0.06)", border:"1px solid rgba(245,158,11,0.22)",
                    display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:10 }}>
                    <div style={{ fontSize:12.5, color:"var(--amber-lt)" }}>
                      <strong>AI scoring rate-limited</strong> — listings ranked by link quality. Wait 2 min then score.
                    </div>
                    <button onClick={async () => {
                      setScoringFailed(false);
                      try { const r = await runScoring(resume, jobs); setJobs(sortJobs(r, confirmedLive)); }
                      catch { setScoringFailed(true); }
                    }} style={{ padding:"6px 14px", borderRadius:4, fontSize:12, fontWeight:600, cursor:"pointer",
                      background:"transparent", border:"1px solid rgba(245,158,11,0.35)", color:"var(--amber-lt)" }}>
                      Score Now
                    </button>
                  </div>
                )}

                {!hasScores && !rescoring && (
                  <div style={{ marginBottom:14, padding:"14px 16px", borderRadius:6,
                    background:"rgba(16,185,129,0.05)", border:"1px solid rgba(16,185,129,0.2)" }}>
                    <div style={{ fontSize:13, fontWeight:600, color:"var(--green-lt)", marginBottom:4 }}>Want these ranked by resume fit?</div>
                    <div style={{ fontSize:12, color:"var(--muted)", marginBottom:10, lineHeight:1.6 }}>
                      Paste your resume and Claude will score every listing, explain gaps, and surface your best-fit roles.
                      Your resume never leaves your browser.
                    </div>
                    <textarea style={{ width:"100%", height:90, padding:"8px 10px", borderRadius:4,
                      background:"var(--card)", border:"1px solid var(--b2)", fontSize:12, fontFamily:"var(--mono)",
                      color:"var(--text)", outline:"none", resize:"vertical", marginBottom:8 }}
                      placeholder="Paste your resume here…"
                      value={pendingResume} onChange={e => setPendingResume(e.target.value)} />
                    <button disabled={pendingResume.trim().length < 80}
                      onClick={async () => {
                        if (pendingResume.trim().length < 80) return;
                        setRescoring(true);
                        try { const r = await runScoring(pendingResume, jobs); setJobs(sortJobs(r, confirmedLive)); setRescoring(false); }
                        catch { setRescoring(false); setScoringFailed(true); }
                      }}
                      style={{ padding:"7px 16px", borderRadius:4, fontSize:12.5, fontWeight:600,
                        cursor: pendingResume.trim().length < 80 ? "not-allowed" : "pointer",
                        background:"rgba(16,185,129,0.12)", border:"1px solid rgba(16,185,129,0.3)",
                        color:"var(--green-lt)", opacity: pendingResume.trim().length < 80 ? 0.4 : 1 }}>
                      Score & Rank Results
                    </button>
                  </div>
                )}

                {rescoring && (
                  <div style={{ marginBottom:14, padding:"12px", borderRadius:6, textAlign:"center",
                    background:"rgba(16,185,129,0.05)", border:"1px solid rgba(16,185,129,0.2)",
                    fontSize:12.5, color:"var(--green-lt)" }}>Scoring listings…</div>
                )}

                {undoStack.length > 0 && (
                  <div style={{ marginBottom:10, padding:"9px 14px", borderRadius:5,
                    display:"flex", alignItems:"center", justifyContent:"space-between",
                    background:"rgba(245,158,11,0.08)", border:"1px solid rgba(245,158,11,0.25)" }}>
                    <span style={{ fontSize:12, color:"var(--amber-lt)" }}>
                      {undoStack.length > 1 && <span style={{ marginRight:6, padding:"1px 6px", borderRadius:2,
                        background:"rgba(245,158,11,0.15)", fontSize:11, fontFamily:"var(--mono)" }}>
                        {undoStack.length} hidden</span>}
                      <strong>{undoStack[undoStack.length-1].title}</strong> hidden —{" "}
                      <span style={{ opacity:.7 }}>{undoStack[undoStack.length-1].reason}</span>
                    </span>
                    <button onClick={undoLast} style={{ marginLeft:12, padding:"4px 10px", borderRadius:3,
                      fontSize:11.5, fontWeight:600, cursor:"pointer", background:"transparent",
                      border:"1px solid rgba(245,158,11,0.4)", color:"var(--amber-lt)" }}>Undo</button>
                  </div>
                )}

                {visible.map(job => (
                  <JobCard key={job.id} job={job} open={open===job.id}
                    onToggle={() => setOpen(open===job.id ? null : job.id)}
                    hasScores={hasScores} onDismiss={dismissJob}
                    confirmedLive={confirmedLive} onConfirm={confirmLive}
                    checked={!!checked[job.id]}
                    onCheck={val => setChecked(p => ({ ...p, [job.id]: val }))} />
                ))}

                {visible.length === 0 && (
                  <div style={{ textAlign:"center", padding:"48px 20px",
                    color:"var(--muted)", fontSize:14, lineHeight:1.8 }}>
                    {filter !== "all"
                      ? <><strong>No {filter}</strong> listings found.<br /><span style={{ fontSize:13, opacity:.7 }}>Try "All" to see every result.</span></>
                      : <>No listings to show.<br /><span style={{ fontSize:13, opacity:.7 }}>Try a new search with a different role or location.</span></>
                    }
                  </div>
                )}

              </>
            )}

            {/* ── Action Plan tab ── */}
            {resultTab === "action plan" && (
              <div>
                <div style={{ marginBottom:18, padding:"12px 16px", borderRadius:6,
                  background:"var(--surf)", border:"1px solid var(--b1)" }}>
                  <div style={{ fontSize:13, fontWeight:600, color:"var(--text)", marginBottom:4 }}>
                    Your Action Plan
                  </div>
                  <div style={{ fontSize:12.5, color:"var(--muted)", lineHeight:1.65 }}>
                    {todoJobs.length === 0
                      ? "Go to Listings and check the boxes next to roles you want to pursue. They'll appear here with AI-generated prompts you can paste directly into Claude or ChatGPT."
                      : todoJobs.length + " role" + (todoJobs.length===1?"":"s") + " saved. Each card has ready-to-use prompts for resume tailoring, cover letters, and outreach."
                    }
                  </div>
                </div>

                {todoJobs.length === 0 ? (
                  <div style={{ textAlign:"center", padding:"32px 20px", color:"var(--muted)", fontSize:14 }}>
                    <div style={{ fontSize:32, marginBottom:12 }}>📋</div>
                    No roles saved yet.<br />
                    <span style={{ fontSize:12.5 }}>Switch to Listings and check the boxes.</span>
                  </div>
                ) : todoJobs.map(job => {
                  const pid = "p" + job.id;
                  const prompts = [
                    { id: pid+"_resume", label:"✏ Resume Tailoring Prompt",
                      prompt:`I'm applying for ${job.title} at ${job.company}. Here is the job description:\n\n${job.description||"(see listing)"}\n\nKey requirements: ${(job.requirements||[]).join(", ")||"(see listing)"}\n\nHere is my resume:\n\n[PASTE YOUR RESUME]\n\nPlease tailor my resume to this specific role. Highlight relevant experience, use keywords from the job description, and clearly flag what to add or remove.` },
                    { id: pid+"_cover", label:"📄 Cover Letter Prompt",
                      prompt:`Write a compelling cover letter for the ${job.title} role at ${job.company}. Job description: ${(job.description||"").slice(0,300)}. My background: [PASTE RESUME SUMMARY]. Tone: professional but direct. Length: 3 tight paragraphs. No generic opener.` },
                    { id: pid+"_outreach", label:"💬 LinkedIn Outreach Prompt",
                      prompt:`Write a short LinkedIn connection request to someone at ${job.company} who works in a similar function to ${job.title}. Goal: show genuine interest, not desperation. Max 3 sentences. No "I hope this message finds you well."` },
                    { id: pid+"_prep", label:"🎯 Interview Prep Prompt",
                      prompt:`I have an interview for ${job.title} at ${job.company}. Job description: ${(job.description||"").slice(0,300)}. My background: [PASTE RESUME SUMMARY]. Give me:\n1. The 5 most likely interview questions\n2. Key points I should emphasize\n3. 2 strong questions to ask them` },
                  ];
                  return (
                    <div key={job.id} style={{ marginBottom:14, padding:"16px 18px", borderRadius:7,
                      background:"var(--surf)", border:"1px solid var(--b1)" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start",
                        marginBottom:14, flexWrap:"wrap", gap:8 }}>
                        <div>
                          <div style={{ fontWeight:600, fontSize:14, color:"var(--text)" }}>{job.title}</div>
                          <div style={{ fontSize:12.5, color:"var(--muted)", marginTop:2 }}>
                            {job.company}{job.location ? " · " + job.location : ""}
                          </div>
                        </div>
                        <div style={{ display:"flex", gap:7, flexWrap:"wrap" }}>
                          {job.url && (
                            <a href={safeApplyUrl(job)} target="_blank" rel="noopener noreferrer"
                              style={{ padding:"6px 14px", borderRadius:4, fontSize:12.5, fontWeight:600,
                                textDecoration:"none", background:"var(--red)", color:"white" }}>
                              Apply ↗
                            </a>
                          )}
                          {companyPeopleUrl(job.company) && (
                            <a href={companyPeopleUrl(job.company)} target="_blank" rel="noopener noreferrer"
                              style={{ padding:"6px 12px", borderRadius:4, fontSize:12.5, textDecoration:"none",
                                background:"rgba(59,130,246,0.07)", border:"1px solid rgba(59,130,246,0.25)",
                                color:"var(--blue-lt)" }}>
                              Connections ↗
                            </a>
                          )}
                        </div>
                      </div>

                      {prompts.map(({ id:btnId, label, prompt }) => (
                        <div key={btnId} style={{ marginBottom:8 }}>
                          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:5 }}>
                            <span style={{ fontSize:12, color:"var(--muted)", fontFamily:"var(--mono)" }}>{label}</span>
                            <button
                              onClick={() => {
                                const showing = promptPreview === btnId;
                                setPromptPreview(showing ? null : btnId);
                                navigator.clipboard.writeText(prompt).then(() => {
                                  setCopiedId(btnId);
                                  setTimeout(() => setCopiedId(null), 2000);
                                }).catch(() => {});
                              }}
                              style={{ padding:"3px 10px", borderRadius:3, fontSize:11, cursor:"pointer",
                                background:"var(--card2)", border:"1px solid var(--b2)",
                                color: copiedId===btnId ? "var(--green-lt)" : "var(--muted)" }}>
                              {copiedId===btnId ? "✓ Copied!" : "Copy Prompt"}
                            </button>
                          </div>
                          {promptPreview === btnId && (
                            <div style={{ padding:"10px 12px", borderRadius:4, background:"var(--card)",
                              border:"1px solid var(--b2)", fontSize:11.5, color:"var(--muted)",
                              fontFamily:"var(--mono)", lineHeight:1.6, whiteSpace:"pre-wrap", wordBreak:"break-word" }}>
                              {prompt}
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
            )}

            {/* Coffee tip */}
            <div style={{ margin:"32px 0 28px", padding:"18px 20px", borderRadius:8,
              background:"var(--surf)", border:"1px solid var(--b1)",
              display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:14 }}>
              <div>
                <div style={{ fontSize:13.5, fontWeight:600, color:"var(--text)", fontFamily:"var(--serif)", marginBottom:4 }}>
                  Found this useful?
                </div>
                <div style={{ fontSize:12, color:"var(--muted)", lineHeight:1.6 }}>
                  This tool is free. If it helped you land an interview, a coffee is appreciated.
                </div>
              </div>
              <a href="https://venmo.com/u/Chris-Wendt-6" target="_blank" rel="noopener noreferrer"
                style={{ display:"flex", alignItems:"center", gap:8, padding:"9px 18px", borderRadius:5,
                  fontSize:13, fontWeight:600, textDecoration:"none", flexShrink:0, whiteSpace:"nowrap",
                  background:"rgba(16,185,129,0.1)", border:"1px solid rgba(16,185,129,0.25)", color:"var(--green-lt)" }}>
                ☕ Treat me to a coffee
              </a>
            </div>

          </div>
        </div>
      );
    }

    // Tiny helper for responsive font size (not a CSS function in inline styles)
    function clamp(min, vw, max) {
      // Returns a CSS clamp string for fontFamily; used inline as string
      return `clamp(${min}px, ${vw}vw, ${max}px)`;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<JobCompiler />);
  </script>
</body>
</html>
